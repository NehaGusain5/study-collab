version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: study_postgres
    restart: always
    environment:
      POSTGRES_USER: study_user
      POSTGRES_PASSWORD: study_password_2026
      POSTGRES_DB: study_tools_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis_cache:
    image: redis:7-alpine
    container_name: study_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: